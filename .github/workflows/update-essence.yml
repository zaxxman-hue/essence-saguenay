name: Update Essence Data

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 12 * * *'
    - cron: '0 14 * * *'
    - cron: '0 16 * * *'
    - cron: '0 18 * * *'
    - cron: '0 20 * * *'
    - cron: '0 22 * * *'
    - cron: '0 0 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Find Excel URL
        run: |
          python3 - <<'EOF'
          import requests
          import re

          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

          try:
              r = requests.get("https://regieessencequebec.ca/", headers=headers, timeout=15)
              print(f"Status: {r.status_code}, Taille: {len(r.text)} chars")
              
              # Cherche le pattern href="/data/stations-XXXXXX.xlsx"
              matches = re.findall(r'href="(/data/stations-\d+\.xlsx)"', r.text)
              
              if matches:
                  url = f"https://regieessencequebec.ca{matches[-1]}"
                  print(f"URL trouvee: {url}")
                  with open("excel_url.txt", "w") as f:
                      f.write(url)
              else:
                  print("Pattern non trouve dans le HTML")
                  print("Extrait HTML:", r.text[2000:3000])
                  with open("excel_url.txt", "w") as f:
                      f.write("")
          except Exception as e:
              print(f"Erreur: {e}")
              with open("excel_url.txt", "w") as f:
                  f.write("")
          EOF

      - name: Run scraper
        run: |
          URL=$(cat excel_url.txt)
          echo "URL: $URL"
          python essence_saguenay.py "$URL"

      - name: Commit data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update essence data"
          git push
