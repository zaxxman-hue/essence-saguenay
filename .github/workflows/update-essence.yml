name: Update Essence Data

on:
  schedule:
    # 5h à 20h EST (10h à 1h UTC) toutes les 30 minutes
    - cron: '0 10 * * *'
    - cron: '30 10 * * *'
    - cron: '0 11 * * *'
    - cron: '30 11 * * *'
    - cron: '0 12 * * *'
    - cron: '30 12 * * *'
    - cron: '0 13 * * *'
    - cron: '30 13 * * *'
    - cron: '0 14 * * *'
    - cron: '30 14 * * *'
    - cron: '0 15 * * *'
    - cron: '30 15 * * *'
    - cron: '0 16 * * *'
    - cron: '30 16 * * *'
    - cron: '0 17 * * *'
    - cron: '30 17 * * *'
    - cron: '0 18 * * *'
    - cron: '30 18 * * *'
    - cron: '0 19 * * *'
    - cron: '30 19 * * *'
    - cron: '0 20 * * *'
    - cron: '30 20 * * *'
    - cron: '0 21 * * *'
    - cron: '30 21 * * *'
    - cron: '0 22 * * *'
    - cron: '30 22 * * *'
    - cron: '0 23 * * *'
    - cron: '30 23 * * *'
    - cron: '0 0 * * *'
    - cron: '30 0 * * *'
    # 20h à 5h EST (1h à 10h UTC) toutes les 2 heures
    - cron: '0 2 * * *'
    - cron: '0 4 * * *'
    - cron: '0 6 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Find Excel URL
        run: |
          python3 - <<'EOF'
          import requests
          import re

          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
          base = "https://regieessencequebec.ca"
          found = None

          r = requests.get(base + "/", headers=headers, timeout=15)
          print(f"Page principale: {r.status_code}, {len(r.text)} chars")

          js_files = re.findall(r'src="(/assets/[^"]*\.js)"', r.text)
          js_files += re.findall(r'src="(/[^"]*\.js)"', r.text)
          print(f"Fichiers JS trouves: {js_files}")

          for js in js_files:
              url_js = base + js
              try:
                  rjs = requests.get(url_js, headers=headers, timeout=10)
                  matches = re.findall(r'stations-\d{14}\.xlsx', rjs.text)
                  if matches:
                      found = f"{base}/data/{matches[-1]}"
                      print(f"URL trouvee dans {js}: {found}")
                      break
                  matches2 = re.findall(r'/data/stations-\d+\.xlsx', rjs.text)
                  if matches2:
                      found = f"{base}{matches2[-1]}"
                      print(f"URL trouvee dans {js}: {found}")
                      break
              except Exception as e:
                  print(f"Erreur JS {js}: {e}")

          if not found:
              from datetime import datetime, timedelta
              import time
              now = datetime.utcnow()
              print("Bruteforce par minutes...")
              for delta in range(0, 480):
                  dt = now - timedelta(minutes=delta)
                  for sec in [0, 1, 2, 3, 5, 10, 15, 30, 45, 59]:
                      ts = dt.strftime(f"%Y%m%d%H%M{sec:02d}")
                      url = f"{base}/data/stations-{ts}.xlsx"
                      try:
                          resp = requests.head(url, headers=headers, timeout=2)
                          if resp.status_code == 200:
                              found = url
                              print(f"URL trouvee bruteforce: {found}")
                              break
                      except:
                          pass
                  if found:
                      break
                  if delta % 50 == 0 and delta > 0:
                      time.sleep(1)

          if found:
              with open("excel_url.txt", "w") as f:
                  f.write(found)
              print(f"URL finale: {found}")
          else:
              print("ECHEC: aucune URL trouvee")
              with open("excel_url.txt", "w") as f:
                  f.write("")
          EOF

      - name: Run scraper
        run: |
          URL=$(cat excel_url.txt)
          echo "URL: $URL"
          python essence_saguenay.py "$URL"

      - name: Commit data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update essence data"
          git push
