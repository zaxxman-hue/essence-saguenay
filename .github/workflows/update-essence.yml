name: Update Essence Data

on:
  schedule:
    - cron: '0 8 * * *'   # 8h AM
    - cron: '0 17 * * *'  # 5h PM
  workflow_dispatch:       # Manuel aussi

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Run scraper
        run: |
          URL=$(curl -s -A "Mozilla/5.0" "https://regieessencequebec.ca/" | grep -o 'data/stations-[0-9]*.xlsx' | tail -1)
          echo "URL trouvee: $URL"
          if [ -z "$URL" ]; then
            python essence_saguenay.py
          else
            python essence_saguenay.py "https://regieessencequebec.ca/$URL"
          fi

      - name: Commit data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update essence data"
          git push
