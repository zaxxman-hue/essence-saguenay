name: Update Essence Data

on:
  schedule:
    - cron: '0 8 * * *'   # 8h AM
    - cron: '0 17 * * *'  # 5h PM
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Find and download Excel
        run: |
          python3 - <<'EOF'
          import requests
          import re
          import json
          import os
          from datetime import datetime

          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

          # Methode 1: cherche dans le JS bundle du site
          urls_to_check = [
              "https://regieessencequebec.ca/",
              "https://regieessencequebec.ca/index.html",
          ]

          found_url = None
          for page_url in urls_to_check:
              try:
                  r = requests.get(page_url, headers=headers, timeout=15)
                  matches = re.findall(r'stations-\d{14,}\.xlsx', r.text)
                  if matches:
                      found_url = f"https://regieessencequebec.ca/data/{matches[-1]}"
                      print(f"URL trouvee dans page: {found_url}")
                      break
              except Exception as e:
                  print(f"Erreur: {e}")

          # Methode 2: cherche dans les fichiers JS
          if not found_url:
              try:
                  r = requests.get("https://regieessencequebec.ca/", headers=headers, timeout=15)
                  js_files = re.findall(r'src="([^"]*\.js[^"]*)"', r.text)
                  for js in js_files[:5]:
                      if not js.startswith('http'):
                          js = f"https://regieessencequebec.ca{js}"
                      try:
                          rjs = requests.get(js, headers=headers, timeout=10)
                          matches = re.findall(r'stations-\d{14,}\.xlsx', rjs.text)
                          if matches:
                              found_url = f"https://regieessencequebec.ca/data/{matches[-1]}"
                              print(f"URL trouvee dans JS: {found_url}")
                              break
                      except:
                          pass
              except Exception as e:
                  print(f"Erreur JS: {e}")

          # Methode 3: aujourd'hui on connait le format exact YYYYMMDDHHMMSS
          # On essaie toutes les secondes de l'heure courante et precedente
          if not found_url:
              now = datetime.utcnow()
              for h in range(now.hour, max(now.hour-6, -1), -1):
                  for m in range(59, -1, -1):
                      for s in [0, 1, 2, 30]:
                          ts = now.strftime(f"%Y%m%d{h:02d}{m:02d}{s:02d}")
                          url = f"https://regieessencequebec.ca/data/stations-{ts}.xlsx"
                          try:
                              resp = requests.head(url, headers=headers, timeout=3)
                              if resp.status_code == 200:
                                  found_url = url
                                  print(f"URL trouvee bruteforce: {found_url}")
                                  break
                          except:
                              pass
                      if found_url:
                          break
                  if found_url:
                      break

          if found_url:
              with open("excel_url.txt", "w") as f:
                  f.write(found_url)
              print(f"URL sauvegardee: {found_url}")
          else:
              print("Aucune URL trouvee")
              with open("excel_url.txt", "w") as f:
                  f.write("")
          EOF

      - name: Run scraper
        run: |
          URL=$(cat excel_url.txt)
          echo "URL utilisee: $URL"
          python essence_saguenay.py "$URL"

      - name: Commit data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update essence data"
          git push
