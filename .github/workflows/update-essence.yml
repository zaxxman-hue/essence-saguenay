name: Update Essence Data

on:
  schedule:
    - cron: '0 8 * * *'   # 8h AM
    - cron: '0 17 * * *'  # 5h PM
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Find Excel URL
        id: find_url
        run: |
          # Cherche l'URL en testant les timestamps des dernières heures
          FOUND=""
          BASE="https://regieessencequebec.ca/data/stations-"
          
          for i in $(seq 0 47); do
            TIMESTAMP=$(date -u -d "-${i} hours" +"%Y%m%d%H0000" 2>/dev/null || date -u -v-${i}H +"%Y%m%d%H0000")
            URL="${BASE}${TIMESTAMP}.xlsx"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -A "Mozilla/5.0" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "URL trouvee: $URL"
              echo "url=$URL" >> $GITHUB_OUTPUT
              FOUND="yes"
              break
            fi
          done
          
          if [ -z "$FOUND" ]; then
            echo "Aucune URL trouvee"
            echo "url=" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper
        run: python essence_saguenay.py "${{ steps.find_url.outputs.url }}"

      - name: Commit data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update essence data"
          git push
