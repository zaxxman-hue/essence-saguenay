<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Essence Saguenay</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 14px 16px 10px;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid #2a2a4a;
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .header-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  h1 { font-size: 19px; font-weight: 700; color: #fff; white-space: nowrap; }
  .header-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

  .btn-refresh, .btn-vue {
    border-radius: 14px; font-size: 12px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap; padding: 5px 10px;
  }

  .btn-refresh { background: #2a2a4a; border: 1px solid #444; color: #4fc3f7; }
  .btn-vue { background: #1e3a2a; border: 1px solid #2a5a3a; color: #4caf50; }
  .btn-vue.actif { background: #4caf50; color: #000; border-color: #4caf50; font-weight: 600; }
  .btn-refresh:hover { background: #3a3a5a; }
  .btn-vue:hover { background: #2a4a3a; }

  .maj { font-size: 10px; color: #4fc3f7; margin-top: 4px; }
  .source { font-size: 10px; color: #555; margin-top: 2px; }

  .filtre {
    display: flex; gap: 6px; margin-top: 8px;
    overflow-x: auto; padding-bottom: 2px; align-items: center;
  }

  .filtre button {
    background: #1e1e3a; border: 1px solid #333; color: #aaa;
    padding: 5px 12px; border-radius: 14px; font-size: 12px;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }

  .filtre button.actif {
    background: #4fc3f7; color: #000; border-color: #4fc3f7; font-weight: 600;
  }

  .filtre-spacer { flex: 1; }

  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; padding: 10px 16px; background: #12122a;
    border-bottom: 1px solid #2a2a4a;
  }

  .stat-card { background: #1e1e3a; border-radius: 10px; padding: 8px; text-align: center; }
  .stat-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 20px; font-weight: 800; margin-top: 3px; }
  .stat-value.bas { color: #4caf50; }
  .stat-value.moyen { color: #ffb74d; }
  .stat-value.haut { color: #ef5350; }

  #vue-liste { display: block; }

  .liste { padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; }

  .station {
    background: #1e1e3a; border-radius: 12px; padding: 12px 14px;
    border: 2px solid #2a2a4a; transition: transform 0.15s;
  }

  .station:active { transform: scale(0.98); }
  .station.couleur-vert { border-color: #4caf50; }
  .station.couleur-orange { border-color: #ffb74d; }
  .station.couleur-rouge { border-color: #ef5350; }

  .station-top { display: flex; align-items: center; gap: 10px; }

  .rang { font-size: 13px; font-weight: 700; color: #666; min-width: 28px; text-align: center; flex-shrink: 0; }
  .station.couleur-vert .rang { color: #4caf50; }
  .station.couleur-orange .rang { color: #ffb74d; }
  .station.couleur-rouge .rang { color: #ef5350; }

  .info { flex: 1; min-width: 0; }
  .banniere { font-size: 19px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge-ville { font-size: 10px; background: #2a2a4a; color: #888; padding: 2px 6px; border-radius: 8px; display: inline-block; margin-top: 3px; }

  .prix-box { text-align: right; flex-shrink: 0; }
  .prix { font-size: 32px; font-weight: 900; line-height: 1; }
  .prix-unit { font-size: 11px; color: #888; margin-top: 2px; }

  .station-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid #252540; gap: 8px; }
  .adresse { font-size: 12px; color: #777; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .btn-map { background: #1a3a2a; border: 1px solid #2a5a3a; color: #4caf50; padding: 5px 10px; border-radius: 8px; font-size: 11px; cursor: pointer; white-space: nowrap; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; flex-shrink: 0; transition: background 0.2s; }
  .btn-map:hover { background: #2a4a3a; }

  #vue-carte { display: none; }
  #map { height: calc(100vh - 140px); width: 100%; z-index: 1; }

  .popup-content { text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-width: 140px; }
  .popup-banniere { font-size: 14px; font-weight: 700; color: #1a1a2e; }
  .popup-prix { font-size: 26px; font-weight: 900; line-height: 1.1; }
  .popup-unit { font-size: 11px; color: #666; }
  .popup-adresse { font-size: 11px; color: #555; margin-top: 4px; }

  .loading { text-align: center; padding: 60px 20px; color: #666; }
  .spinner { width: 36px; height: 36px; border: 3px solid #333; border-top-color: #4fc3f7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .erreur { text-align: center; padding: 40px 20px; color: #ef5350; }
  .vide { text-align: center; padding: 40px; color: #555; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>&#9981; Essence Saguenay</h1>
    <div class="header-right">
      <button class="btn-vue" id="btn-carte" onclick="toggleVue()">&#128506; Carte</button>
      <button class="btn-refresh" id="btn-refresh" onclick="charger()">&#8635;</button>
    </div>
  </div>
  <div class="maj" id="maj">Chargement...</div>
  <div class="source" id="source"></div>
  <div class="filtre">
    <button class="actif" id="btn-jonquiere" onclick="filtrer(this, 'Jonquiere')">Jonquière</button>
    <button id="btn-chicoutimi" onclick="filtrer(this, 'Chicoutimi')">Chicoutimi</button>
    <button id="btn-labaie" onclick="filtrer(this, 'LaBaie')">La Baie</button>
    <div class="filtre-spacer"></div>
    <button id="btn-tous" onclick="filtrer(this, 'tous')">Tous</button>
  </div>
</header>

<div class="stats" id="stats" style="display:none">
  <div class="stat-card">
    <div class="stat-label">Plus bas</div>
    <div class="stat-value bas" id="stat-bas">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Moyen</div>
    <div class="stat-value moyen" id="stat-moy">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Plus haut</div>
    <div class="stat-value haut" id="stat-haut">—</div>
  </div>
</div>

<div id="vue-liste">
  <div id="contenu">
    <div class="loading">
      <div class="spinner"></div>
      <div>Chargement des prix...</div>
    </div>
  </div>
</div>

<div id="vue-carte">
  <div id="map"></div>
</div>

<script>
let toutesStations = [];
let filtreActuel = 'Jonquiere';
let vueActuelle = 'liste';
let carteInit = false;
let leafletMap = null;
let markers = [];

// Determine la couleur selon le tiers de prix
function getCouleur(prix, prixMin, prixMax) {
  const range = prixMax - prixMin;
  if (range === 0) return 'vert';
  const tiers = range / 3;
  if (prix <= prixMin + tiers) return 'vert';
  if (prix <= prixMin + tiers * 2) return 'orange';
  return 'rouge';
}

async function charger() {
  const btn = document.getElementById('btn-refresh');
  btn.textContent = '⏳';

  try {
    const r = await fetch('data.json?t=' + Date.now());
    if (!r.ok) throw new Error('Fichier introuvable');
    const data = await r.json();

    toutesStations = data.stations || [];
    document.getElementById('maj').textContent = 'Vérifié: ' + (data.derniere_verification || data.mise_a_jour);
    if (data.fichier_source) {
      document.getElementById('source').textContent = 'Source: ' + data.fichier_source;
    }

    const stations = filtrerStations(toutesStations, filtreActuel);
    afficherStats(stations);

    if (vueActuelle === 'liste') {
      afficherListe(stations);
    } else {
      afficherCarte(stations);
    }
  } catch(e) {
    document.getElementById('contenu').innerHTML = `<div class="erreur">Données non disponibles<br><small>${e.message}</small></div>`;
  } finally {
    btn.textContent = '↻';
  }
}

function filtrerStations(stations, zone) {
  if (zone === 'tous') return [...stations].sort((a, b) => a.prix - b.prix);
  return stations.filter(s => {
    const ville = (s.ville || '').toLowerCase();
    const adresse = (s.adresse || '').toLowerCase();
    if (zone === 'LaBaie') return ville.includes('baie') || adresse.includes('la baie') || adresse.includes('ville de la baie');
    return ville.includes(zone.toLowerCase());
  });
}

function filtrer(btn, zone) {
  filtreActuel = zone;
  document.querySelectorAll('.filtre button').forEach(b => b.classList.remove('actif'));
  btn.classList.add('actif');
  const stations = filtrerStations(toutesStations, zone);
  afficherStats(stations);
  if (vueActuelle === 'liste') {
    afficherListe(stations);
  } else {
    afficherCarte(stations);
  }
}

function toggleVue() {
  const btnCarte = document.getElementById('btn-carte');
  if (vueActuelle === 'liste') {
    vueActuelle = 'carte';
    document.getElementById('vue-liste').style.display = 'none';
    document.getElementById('vue-carte').style.display = 'block';
    document.getElementById('stats').style.display = 'none';
    btnCarte.classList.add('actif');
    btnCarte.textContent = '☰ Liste';
    afficherCarte(filtrerStations(toutesStations, filtreActuel));
  } else {
    vueActuelle = 'liste';
    document.getElementById('vue-liste').style.display = 'block';
    document.getElementById('vue-carte').style.display = 'none';
    btnCarte.classList.remove('actif');
    btnCarte.textContent = '🗺 Carte';
    const stations = filtrerStations(toutesStations, filtreActuel);
    afficherStats(stations);
    afficherListe(stations);
  }
}

function afficherStats(stations) {
  const prix = stations.map(s => s.prix).filter(p => p > 0).sort((a, b) => a - b);
  if (prix.length === 0) { document.getElementById('stats').style.display = 'none'; return; }
  const moyen = prix.reduce((a, b) => a + b, 0) / prix.length;
  document.getElementById('stat-bas').textContent = prix[0] + '¢';
  document.getElementById('stat-moy').textContent = Math.round(moyen) + '¢';
  document.getElementById('stat-haut').textContent = prix[prix.length - 1] + '¢';
  if (vueActuelle === 'liste') document.getElementById('stats').style.display = 'grid';
}

function afficherListe(stations) {
  if (!stations || stations.length === 0) {
    document.getElementById('contenu').innerHTML = '<div class="vide">Aucune station trouvée</div>';
    return;
  }

  const prix = stations.map(s => s.prix).filter(p => p > 0).sort((a, b) => a - b);
  if (prix.length === 0) {
    document.getElementById('contenu').innerHTML = '<div class="vide">Aucun prix disponible</div>';
    return;
  }

  const prixMin = prix[0];
  const prixMax = prix[prix.length - 1];

  let html = '<div class="liste">';

  stations.forEach((s, i) => {
    const rang = i === 0 ? '&#129351;' : i === 1 ? '&#129352;' : i === 2 ? '&#129353;' : (i + 1);
    const couleur = getCouleur(s.prix, prixMin, prixMax);
    const couleurHex = couleur === 'vert' ? '#4caf50' : couleur === 'orange' ? '#ffb74d' : '#ef5350';
    const ville = s.ville && s.ville !== 'Saguenay' ? `<span class="badge-ville">${s.ville}</span>` : '';
    const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.adresse + ', Saguenay, QC, Canada');

    html += `
      <div class="station couleur-${couleur}">
        <div class="station-top">
          <div class="rang">${rang}</div>
          <div class="info">
            <div class="banniere">${s.banniere}</div>
            ${ville}
          </div>
          <div class="prix-box">
            <div class="prix" style="color:${couleurHex}">${s.prix}</div>
            <div class="prix-unit">¢/litre</div>
          </div>
        </div>
        <div class="station-bottom">
          <div class="adresse">&#128205; ${s.adresse}</div>
          <a class="btn-map" href="${mapsUrl}" target="_blank">&#128205; Maps</a>
        </div>
      </div>`;
  });

  html += '</div>';
  document.getElementById('contenu').innerHTML = html;
}

function afficherCarte(stations) {
  if (!carteInit) {
    leafletMap = L.map('map').setView([48.42, -71.07], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(leafletMap);
    carteInit = true;
  }

  markers.forEach(m => leafletMap.removeLayer(m));
  markers = [];

  if (!stations || stations.length === 0) return;

  const prix = stations.map(s => s.prix).filter(p => p > 0).sort((a, b) => a - b);
  const prixMin = prix[0];
  const prixMax = prix[prix.length - 1];

  stations.forEach(s => {
    if (!s.prix || s.prix <= 0 || !s.lat || !s.lon) return;

    const couleur = getCouleur(s.prix, prixMin, prixMax);
    const pointCouleur = couleur === 'vert' ? '#4caf50' : couleur === 'orange' ? '#ffb74d' : '#ef5350';
    const pointBorder = couleur === 'vert' ? '#2a7a3a' : couleur === 'orange' ? '#9a6a00' : '#9a2a2a';
    const tagBg = couleur === 'vert' ? 'rgba(220,255,220,0.97)' : couleur === 'orange' ? 'rgba(255,240,200,0.97)' : 'rgba(255,220,220,0.97)';
    const tagText = couleur === 'vert' ? '#1a4a1a' : couleur === 'orange' ? '#4a3000' : '#4a1a1a';

    const icon = L.divIcon({
      className: '',
      html: `<div style="display:flex;flex-direction:column;align-items:center;">
               <div style="width:14px;height:14px;background:${pointCouleur};border:2px solid ${pointBorder};border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.5);"></div>
               <div style="background:${tagBg};border:2px solid ${pointCouleur};border-radius:6px;padding:2px 7px;font-size:13px;font-weight:900;color:${tagText};white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.4);font-family:-apple-system,sans-serif;margin-top:2px;">${s.prix}¢</div>
             </div>`,
      iconAnchor: [30, 26]
    });

    const marker = L.marker([s.lat, s.lon], { icon })
      .addTo(leafletMap)
      .bindPopup(`
        <div class="popup-content">
          <div class="popup-banniere">${s.banniere}</div>
          <div class="popup-prix" style="color:${pointCouleur}">${s.prix}¢</div>
          <div class="popup-unit">/ litre</div>
          <div class="popup-adresse">${s.adresse}</div>
        </div>
      `);
    markers.push(marker);
  });

  if (filtreActuel === 'Jonquiere') leafletMap.setView([48.43, -71.22], 12);
  else if (filtreActuel === 'Chicoutimi') leafletMap.setView([48.42, -71.05], 12);
  else if (filtreActuel === 'LaBaie') leafletMap.setView([48.33, -70.88], 13);
  else leafletMap.setView([48.40, -71.10], 11);
}

charger();
setInterval(charger, 30 * 60 * 1000);
</script>

</body>
</html>
